apiVersion: apps/v1
kind: Deployment
metadata:
  name: atos-api-database-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database-service
  template:
    metadata:
      labels:
        app: database-service
    spec:
      containers:
      - name: database-service
        image: "$IMAGE/database-service:latest"
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 8080
        envFrom:
          - secretRef:
              name: core-env
      imagePullSecrets:
        - name: jfrogregistrykey
