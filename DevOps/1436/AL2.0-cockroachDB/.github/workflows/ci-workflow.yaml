#name: Build and Deploy to GKE

on:
  push:
    branches:
    - CCFS_1436

env:
  DEV_PROJECT_ID: ${{ secrets.GCP_DEV_PROJECT_ID }}
  DEV_CLUSTER_NAME: ces-api-k8s-dev-001   
  DEV_CLUSTER_ZONE: us-east1-b   
  IMAGE: atosapis.jfrog.io/api-docker-images/database-service:latest


jobs:
  setup-build-publish:
    name: Setup, Build, Publish, CreateNodePool, Deploy, AttachLoadBalancer
    runs-on: ubuntu-latest

    steps:
    # Checkout the Repository
    - name: Checking out the repository
      uses: actions/checkout@v2
      
     # Setting up Docker Builder
    - name: Set up Docker Builder
      uses: docker/setup-buildx-action@v1

    # Setup gcloud CLI
    - uses: google-github-actions/setup-gcloud@master
      with:
        version: '290.0.1'
        service_account_email: ${{ secrets.GCP_SA_DEV_EMAIL }}
        service_account_key: ${{ secrets.GCP_SA_DEV_KEY }}
    
    # Setup JFrog CLI
    - uses: jfrog/setup-jfrog-cli@v1
      env:
        JF_ARTIFACTORY_1: ${{ secrets.JFROG_TOKEN }}


    # Configure Docker to use the gcloud command-line tool as a credential
    # helper for authentication
    - run: |-
        gcloud --quiet auth configure-docker
    - run: |-
        gcloud config set project $DEV_PROJECT_ID
    # Get the GKE credentials so we can deploy to the cluster
    - run: |-
        gcloud container clusters get-credentials $DEV_CLUSTER_NAME --zone $DEV_CLUSTER_ZONE
    # Build the Docker image
#     - name: Build Image
#       run: |-
#         docker build -t $IMAGE .
#     # Push docker image to jfrog artifactory with the help of jfrog cli
#     - run: |
#         jfrog rt docker-push $IMAGE api-docker-images --build-name=database-service --build-number=1

#     # Publish the build info
#     - run: |
#         jfrog rt bp database-service 1
#     # Scan the build with jfrog xray
#     - run: |
#         jfrog rt bs database-service 1

    # Deploy the Docker image to the GKE cluster
    - name: Deploy
      run: |-
        cd env/
        kubectl apply -f jfrogsecret.yaml
        kubectl apply -f core-secrets-definition.yaml --validate=false
        kubectl apply -f cockroach-stateful-set.yaml
        kubectl apply -f cockroach-cluster-init.yaml
#         kubectl delete -f database-service-deployment.yaml
#        kubectl set image deployment/atos-api-database-service database-service=$IMAGE



